<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マスタ保守 | マスタ保守 | 図書館保守システム</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/auth-bar.css" />
  <link rel="stylesheet" href="css/global-nav.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      --max-width: 720px;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }

    .app {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 1.25rem 1rem 2.5rem;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .nav a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    .nav a:hover {
      text-decoration: underline;
    }

    .nav a[aria-current="page"] {
      color: var(--text);
      text-decoration: none;
      cursor: default;
    }

    .nav--return {
      margin-bottom: 0.35rem;
    }

    .nav--return a {
      font-size: 0.85rem;
    }

    .header {
      margin-bottom: 1rem;
    }

    .header h1 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 700;
    }

    .header p {
      margin: 0.35rem 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .header__note {
      margin: 0.5rem 0 0;
      font-size: 0.9rem;
      color: var(--warn-text);
    }

    .maintenance-banner {
      padding: 0.65rem 1rem;
      border-radius: var(--radius);
      background: var(--warn-bg);
      color: var(--warn-text);
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
    }

    .portal-groups {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .portal-group__title {
      margin: 0 0 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .portal-group__grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: 1fr;
    }

    @media (min-width: 520px) {
      .portal-group__grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .portal-card {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .portal-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(30, 58, 138, 0.12);
    }

    .portal-card h3 {
      margin: 0 0 0.35rem;
      font-size: 1.05rem;
      color: var(--accent);
    }

    .portal-card p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .portal-card--disabled {
      opacity: 0.55;
      cursor: not-allowed;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="auth-bar"></div>
    <div id="global-nav"></div>
    <div id="sub-nav"></div>

    <div class="maintenance-banner" role="note">
      マスタ保守モード — 登録データの追加・変更・削除はこのエリアで行います
    </div>

    <header class="header">
      <h1>マスタ保守</h1>
      <p>登録データの追加・変更・削除を行います</p>
      <p class="header__note">※ 日常の貸出・返却はトップ画面で行ってください。</p>
    </header>

    <div class="portal-groups">
      <section class="portal-group" aria-labelledby="portal-group-books">
        <h2 class="portal-group__title" id="portal-group-books">図書・図書カテゴリ</h2>
        <div class="portal-group__grid">
          <a class="portal-card" href="books.html">
            <h3>図書マスタ</h3>
            <p>図書の登録・変更・削除</p>
          </a>
          <a class="portal-card" href="categories.html">
            <h3>図書カテゴリマスタ</h3>
            <p>カテゴリの登録・変更・削除</p>
          </a>
        </div>
      </section>

      <section class="portal-group" aria-labelledby="portal-group-students">
        <h2 class="portal-group__title" id="portal-group-students">学生・学部</h2>
        <div class="portal-group__grid">
          <a class="portal-card" href="students.html">
            <h3>学生マスタ</h3>
            <p>学籍番号・氏名・学部学科・生年月日</p>
          </a>
          <a class="portal-card" href="masters.html">
            <h3>学部・学科マスタ</h3>
            <p>学部（親）と学科（子）の管理</p>
          </a>
        </div>
      </section>

      <section class="portal-group" aria-labelledby="portal-group-staff">
        <h2 class="portal-group__title" id="portal-group-staff">担当者</h2>
        <div class="portal-group__grid">
          <a class="portal-card" href="staff.html">
            <h3>担当者マスタ</h3>
            <p>職員番号・氏名・ログインメール</p>
          </a>
        </div>
      </section>
    </div>
  </div>

  <script>
    (async function init() {
      if (!(await LibralyAuth.requireAuth())) return;
      await LibralyAuth.renderUserBar(document.getElementById("auth-bar"));
      LibralyNav.renderGlobalNav(
        document.getElementById("global-nav"),
        LibralyNav.SECTION_MAINTENANCE
      );
      LibralyNav.renderMaintenanceSubNav(document.getElementById("sub-nav"), "admin");
    })();
  </script>
</body>
</html>
