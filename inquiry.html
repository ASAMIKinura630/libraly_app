<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>貸出履歴照会 | 図書館保守システム</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <link rel="stylesheet" href="css/auth-bar.css" />
  <link rel="stylesheet" href="css/global-nav.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #f4f1ea;
      --surface: #fffef9;
      --border: #d8d0c4;
      --text: #2c2416;
      --muted: #6b5f4f;
      --accent: #2d5a4a;
      --shadow: 0 2px 12px rgba(44, 36, 22, 0.08);
      --radius: 10px;
      --max-width: 720px;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }

    .app {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 1.25rem 1rem 2.5rem;
    }

    .header h1 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 700;
    }

    .header p {
      margin: 0.35rem 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .inquiry-banner {
      margin-bottom: 1rem;
    }

    .portal-grid {
      display: grid;
      gap: 1rem;
    }

    @media (min-width: 520px) {
      .portal-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .portal-card {
      display: block;
      padding: 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .portal-card:hover {
      border-color: #2a4365;
      box-shadow: 0 4px 16px rgba(44, 36, 22, 0.12);
    }

    .portal-card h2 {
      margin: 0 0 0.35rem;
      font-size: 1.15rem;
      color: var(--accent);
    }

    .portal-card p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="auth-bar"></div>
    <div id="global-nav"></div>

    <div class="inquiry-banner" role="note">
      照会モード — 貸出履歴の参照のみ行います（貸出・返却の操作はできません）
    </div>

    <header class="header">
      <h1>貸出履歴照会</h1>
      <p>図書または学生を起点に、貸出履歴を照会します</p>
    </header>

    <div class="portal-grid">
      <a class="portal-card" href="books.html?mode=inquiry">
        <h2>図書から照会</h2>
        <p>図書を選び、誰が・いつ借りたかを確認します</p>
      </a>
      <a class="portal-card" href="students.html?mode=inquiry">
        <h2>学生から照会</h2>
        <p>学生を選び、何を・いつ借りたかを確認します</p>
      </a>
    </div>
  </div>

  <script>
    (async function init() {
      if (!(await LibralyAuth.requireAuth())) return;
      await LibralyAuth.renderUserBar(document.getElementById("auth-bar"));
      LibralyNav.renderGlobalNav(
        document.getElementById("global-nav"),
        LibralyNav.SECTION_INQUIRY
      );
    })();
  </script>
</body>
</html>
