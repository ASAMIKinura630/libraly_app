<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>図書貸出履歴 | マスタ保守 | 図書館保守システム</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/auth-bar.css" />
  <link rel="stylesheet" href="css/global-nav.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      --max-width: 960px;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }

    .app {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 1.25rem 1rem 2.5rem;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .nav a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    .nav a:hover {
      text-decoration: underline;
    }

    .nav--return {
      margin-bottom: 0.35rem;
    }

    .nav--return a {
      font-size: 0.85rem;
    }

    .maintenance-banner {
      padding: 0.65rem 1rem;
      border-radius: var(--radius);
      background: var(--warn-bg);
      color: var(--warn-text);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .header h1 {
      margin: 0;
      font-size: 1.75rem;
    }

    .header p {
      margin: 0.35rem 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .card h2 {
      margin: 0 0 1rem;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .book-summary__title {
      margin: 0 0 0.5rem;
      font-size: 1.35rem;
      font-weight: 700;
      word-break: break-word;
    }

    .book-summary__row {
      margin: 0.35rem 0;
      font-size: 0.95rem;
    }

    .book-summary__label {
      color: var(--muted);
      font-weight: 600;
      margin-right: 0.35rem;
    }

    .book-summary__content {
      margin: 0.75rem 0 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.95rem;
    }

    .category-label {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      background: #e8eef5;
      color: var(--inquiry-banner-text);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .category-label--none {
      background: transparent;
      color: var(--muted);
      font-weight: 400;
      padding: 0;
    }

    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .history-table th,
    .history-table td {
      padding: 0.65rem 0.5rem;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: middle;
    }

    .history-table th {
      font-weight: 600;
      background: var(--panel-alt);
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .badge--lending {
      background: var(--warn-bg);
      color: var(--warn-text);
    }

    .badge--returned {
      background: var(--success-bg);
      color: var(--success-text);
    }

    .empty-state,
    .loading {
      text-align: center;
      color: var(--muted);
      padding: 2rem 1rem;
      margin: 0;
    }

    .message {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      font-size: 0.95rem;
      background: #fdecea;
      color: #8b2e26;
    }

    .message.is-visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="auth-bar"></div>
    <div id="global-nav"></div>
    <div id="sub-nav"></div>
    <nav id="breadcrumb"></nav>

    <div id="zone-banner" class="maintenance-banner" role="note">
      マスタ保守モード — 図書の貸出履歴を照会しています
    </div>

    <header class="header">
      <h1>図書貸出履歴</h1>
      <p>選択した図書の貸出履歴（誰が・いつ借りたか）</p>
    </header>

    <div id="message" class="message" role="alert"></div>

    <section class="card" aria-labelledby="book-summary-heading">
      <h2 id="book-summary-heading">図書情報</h2>
      <div id="book-summary">
        <p class="loading">読み込み中…</p>
      </div>
    </section>

    <section class="card" aria-labelledby="history-heading">
      <h2 id="history-heading">貸出履歴</h2>
      <div id="history-list" class="table-wrap">
        <p class="loading">読み込み中…</p>
      </div>
    </section>
  </div>

  <script>
    const BOOK_TABLE = "libraly_app";
    const HISTORY_TABLE = "libraly_app_lending_history";

    const supabaseClient = LibralyAuth.getClient();
    const urlParams = new URLSearchParams(window.location.search);
    const bookId = urlParams.get("id");
    const fromInquiry = urlParams.get("from") === "inquiry";

    const messageEl = document.getElementById("message");
    const bookSummaryEl = document.getElementById("book-summary");
    const historyListEl = document.getElementById("history-list");

    function escapeHtml(str) {
      if (str == null) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function showError(text) {
      messageEl.textContent = text;
      messageEl.classList.add("is-visible");
    }

    function formatDateOnly(value) {
      if (!value) return "—";
      if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
        const parts = value.split("-");
        return parts[0] + "/" + parts[1] + "/" + parts[2];
      }
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "—";
      return d.toLocaleDateString("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      });
    }

    function formatDateTime(isoString) {
      if (!isoString) return "—";
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return "—";
      return date.toLocaleString("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function getCategoryName(book) {
      if (book.libraly_app_category && book.libraly_app_category.name) {
        return book.libraly_app_category.name;
      }
      return null;
    }

    function getStudentName(record) {
      if (record.libraly_app_student && record.libraly_app_student.name) {
        return record.libraly_app_student.name;
      }
      return "—";
    }

    function getProcessorName(staff) {
      if (staff && staff.name) return staff.name;
      return "—";
    }

    function renderBookSummary(book) {
      const categoryName = getCategoryName(book);
      const categoryHtml = categoryName
        ? '<span class="category-label">' + escapeHtml(categoryName) + "</span>"
        : '<span class="category-label category-label--none">未設定</span>';

      bookSummaryEl.innerHTML =
        '<h3 class="book-summary__title">' +
        escapeHtml(book.title) +
        "</h3>" +
        '<p class="book-summary__row"><span class="book-summary__label">著者</span>' +
        escapeHtml(book.name) +
        "</p>" +
        '<p class="book-summary__row"><span class="book-summary__label">カテゴリ</span>' +
        categoryHtml +
        "</p>" +
        '<p class="book-summary__row"><span class="book-summary__label">登録日時</span>' +
        escapeHtml(formatDateTime(book.created_at)) +
        "</p>" +
        '<p class="book-summary__content"><span class="book-summary__label">あらすじ</span><br>' +
        escapeHtml(book.content) +
        "</p>";

      document.title =
        book.title +
        " の貸出履歴 | " +
        (fromInquiry ? "貸出履歴照会" : "マスタ保守") +
        " | 図書館保守システム";

      if (fromInquiry) {
        LibralyNav.renderBreadcrumb(document.getElementById("breadcrumb"), [
          { label: "貸出・返却", href: "index.html" },
          { label: "貸出履歴照会", href: "inquiry.html" },
          { label: "図書から照会", href: "books.html?mode=inquiry" },
          { label: book.title + " の貸出履歴" },
        ]);
      } else {
        LibralyNav.renderBreadcrumb(document.getElementById("breadcrumb"), [
          { label: "貸出・返却", href: "index.html" },
          { label: "マスタ保守", href: "admin.html" },
          { label: "図書マスタ", href: "books.html" },
          { label: book.title + " の貸出履歴" },
        ]);
      }
    }

    function initPageLayout() {
      LibralyNav.renderGlobalNav(
        document.getElementById("global-nav"),
        fromInquiry ? LibralyNav.SECTION_INQUIRY : LibralyNav.SECTION_MAINTENANCE
      );

      var banner = document.getElementById("zone-banner");
      if (fromInquiry) {
        document.getElementById("sub-nav").hidden = true;
        banner.className = "inquiry-banner";
        banner.textContent = "照会モード — 図書の貸出履歴を照会しています";
      } else {
        document.getElementById("sub-nav").hidden = false;
        LibralyNav.renderMaintenanceSubNav(document.getElementById("sub-nav"), "books");
      }
    }

    function renderHistoryList(records) {
      if (!records || records.length === 0) {
        historyListEl.innerHTML =
          '<p class="empty-state">この図書の貸出履歴はありません。</p>';
        return;
      }

      historyListEl.innerHTML =
        '<table class="history-table">' +
        "<thead><tr>" +
        "<th>状態</th><th>学籍番号</th><th>氏名</th><th>貸し出し日</th><th>返却予定日</th><th>返却日</th><th>貸出処理者</th><th>返却処理者</th>" +
        "</tr></thead><tbody>" +
        records
          .map(function (h) {
            const statusBadge = h.is_returned
              ? '<span class="badge badge--returned">返却済み</span>'
              : '<span class="badge badge--lending">貸出中</span>';
            return (
              "<tr>" +
              "<td>" + statusBadge + "</td>" +
              "<td>" + escapeHtml(h.student_number) + "</td>" +
              "<td>" + escapeHtml(getStudentName(h)) + "</td>" +
              "<td>" + escapeHtml(formatDateOnly(h.created_at)) + "</td>" +
              "<td>" + escapeHtml(formatDateOnly(h.due_date)) + "</td>" +
              "<td>" + escapeHtml(h.is_returned ? formatDateOnly(h.returned_at) : "—") + "</td>" +
              "<td>" + escapeHtml(getProcessorName(h.lent_staff)) + "</td>" +
              "<td>" + escapeHtml(getProcessorName(h.returned_staff)) + "</td>" +
              "</tr>"
            );
          })
          .join("") +
        "</tbody></table>";
    }

    async function loadPage() {
      if (!bookId) {
        showError("図書が指定されていません。図書一覧から再度お試しください。");
        bookSummaryEl.innerHTML = '<p class="empty-state">図書IDがありません。</p>';
        historyListEl.innerHTML = "";
        return;
      }

      const [bookRes, historyRes] = await Promise.all([
        supabaseClient
          .from(BOOK_TABLE)
          .select(
            "id, title, content, name, category_id, created_at, libraly_app_category ( name )"
          )
          .eq("id", bookId)
          .maybeSingle(),
        supabaseClient
          .from(HISTORY_TABLE)
          .select(
            "id, student_number, is_returned, due_date, returned_at, created_at, " +
              "libraly_app_student!libraly_app_lending_history_student_number_fkey ( student_number, name ), " +
              "lent_staff:libraly_app_staff!libraly_app_lending_history_lent_by_staff_id_fkey ( name ), " +
              "returned_staff:libraly_app_staff!libraly_app_lending_history_returned_by_staff_id_fkey ( name )"
          )
          .eq("book_id", bookId)
          .order("created_at", { ascending: false }),
      ]);

      if (bookRes.error || !bookRes.data) {
        console.error(bookRes.error);
        showError("図書データの取得に失敗しました。");
        bookSummaryEl.innerHTML = '<p class="empty-state">図書が見つかりません。</p>';
        historyListEl.innerHTML = "";
        return;
      }

      if (historyRes.error) {
        console.error(historyRes.error);
        renderBookSummary(bookRes.data);
        historyListEl.innerHTML =
          '<p class="empty-state">貸出履歴の取得に失敗しました。</p>';
        return;
      }

      renderBookSummary(bookRes.data);
      renderHistoryList(historyRes.data || []);
    }

    (async function init() {
      if (!(await LibralyAuth.requireAuth())) return;
      await LibralyAuth.renderUserBar(document.getElementById("auth-bar"));
      initPageLayout();
      await loadPage();
    })();
  </script>
</body>
</html>
