<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>貸出・返却 | 図書館保守システム</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/auth-bar.css" />
  <link rel="stylesheet" href="css/global-nav.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      --max-width: 960px;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }

    .app {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 1.25rem 1rem 2.5rem;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      align-items: center;
    }

    .nav--ops {
      justify-content: space-between;
    }

    .nav__admin-link {
      margin-left: auto;
    }

    .nav a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    .nav a:hover {
      text-decoration: underline;
    }

    .nav a[aria-current="page"] {
      color: var(--text);
      text-decoration: none;
      cursor: default;
    }

    .header {
      margin-bottom: 1rem;
    }

    .header h1 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 700;
    }

    .header p {
      margin: 0.35rem 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .message {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    .message.is-visible {
      display: block;
    }

    .message--success { background: var(--success-bg); color: var(--success-text); }
    .message--warn { background: var(--warn-bg); color: var(--warn-text); }
    .message--error { background: var(--error-bg); color: var(--error-text); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .card h2 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .card-header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.35rem 1rem;
      margin-bottom: 0;
    }

    .card-header__hint {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--muted);
    }

    .lend-panels,
    .search-panels {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 1.25rem;
      margin-top: 1rem;
    }

    .lend-panel,
    .search-panel {
      flex: none;
      width: 100%;
      background: var(--panel-alt);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1rem 1.1rem;
    }

    @media (min-width: 600px) {
      .lend-panels,
      .search-panels {
        flex-direction: row;
        flex-wrap: nowrap;
        gap: 1rem;
      }

      .lend-panel,
      .search-panel {
        flex: 1 1 0;
        min-width: 0;
        width: auto;
      }
    }

    .lend-panel--book,
    .search-panel--book {
      border-left: 4px solid var(--accent);
    }

    .lend-panel--student,
    .search-panel--student {
      border-left: 4px solid var(--accent-secondary);
    }

    .lend-panel__title,
    .search-panel__title {
      margin: 0 0 0.85rem;
      padding-bottom: 0.5rem;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }

    .lend-panel__fields,
    .search-panel__fields {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .form-group {
      margin-bottom: 0;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.35rem;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .form-group select,
    .form-group input[type="date"] {
      width: 100%;
      padding: 0.65rem 0.75rem;
      font-size: 1rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      min-height: 44px;
    }

    .form-group select:focus,
    .form-group input[type="date"]:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-color: var(--accent);
    }

    .form-hint {
      display: block;
      margin-top: 0.35rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0.5rem 1.25rem;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      flex: 1;
      min-width: 140px;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .btn-return {
      background: var(--success-bg);
      color: var(--success-text);
      padding: 0.35rem 0.75rem;
      min-height: 36px;
      font-size: 0.85rem;
    }

    .btn-return:hover:not(:disabled) {
      background: #d4eadc;
    }

    .list-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1rem;
      align-items: flex-end;
      margin: 1rem 0;
    }

    .list-toolbar .form-group {
      flex: 1;
      min-width: 140px;
    }

    .list-toolbar select,
    .list-toolbar input,
    .search-panel input {
      width: 100%;
      min-height: 44px;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
    }

    .search-panel input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-color: var(--accent);
    }

    .list-toolbar--status {
      margin-top: 1rem;
    }

    .list-toolbar__actions {
      flex-shrink: 0;
    }

    .btn-secondary {
      background: var(--panel-alt);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--border);
    }

    .search-panels {
      margin-top: 0.75rem;
      margin-bottom: 0;
    }

    .list-count {
      margin: 0 0 0.75rem;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .history-table th,
    .history-table td {
      padding: 0.65rem 0.5rem;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: middle;
    }

    .history-table th {
      font-weight: 600;
      background: var(--panel-alt);
      white-space: nowrap;
    }

    .history-table .actions {
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .badge--lending {
      background: var(--warn-bg);
      color: var(--warn-text);
    }

    .badge--returned {
      background: var(--success-bg);
      color: var(--success-text);
    }

    .badge--overdue {
      background: #ffebee;
      color: #c62828;
    }

    .badge--due-soon {
      background: #fff3e0;
      color: #e65100;
    }

    .badge--sub-lend {
      background: #ede7f6;
      color: #4527a0;
      margin-left: 0.25rem;
    }

    .btn-sub-lend {
      margin-left: 0.35rem;
      font-size: 0.85rem;
      padding: 0.25rem 0.55rem;
    }

    .sub-lend-dialog {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
      padding: 1rem;
    }

    .sub-lend-dialog.is-hidden {
      display: none;
    }

    .sub-lend-dialog__panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.35rem;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow);
    }

    .sub-lend-dialog__panel h3 {
      margin: 0 0 0.5rem;
      font-size: 1.1rem;
    }

    .sub-lend-dialog__desc {
      font-size: 0.9rem;
      color: var(--text-muted, #666);
      margin: 0 0 1rem;
    }

    .sub-lend-dialog textarea {
      width: 100%;
      font-family: inherit;
      font-size: 1rem;
      padding: 0.5rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      resize: vertical;
    }

    .sub-lend-dialog .form-actions {
      margin-top: 1rem;
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .loan-summary {
      margin-bottom: 1rem;
      padding: 1rem 1.15rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .loan-summary__title {
      margin: 0 0 0.75rem;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--accent);
    }

    .loan-summary__grid {
      display: grid;
      gap: 0.75rem;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .loan-summary__item {
      padding: 0.75rem 0.85rem;
      background: var(--panel-alt);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .loan-summary__label {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    .loan-summary__value {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .loan-summary__actions {
      margin-top: 0.35rem;
    }

    .loan-summary__link {
      padding: 0;
      font-size: 0.82rem;
      font-family: inherit;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }

    .loan-summary__link:hover {
      color: var(--accent-hover);
    }

    .empty-state,
    .loading {
      text-align: center;
      color: var(--muted);
      padding: 2rem 1rem;
      margin: 0;
    }

    .auth-gate {
      max-width: 420px;
      margin: 0 auto;
    }

    .auth-gate.is-hidden {
      display: none;
    }

    #app-main.is-hidden {
      display: none;
    }

    .auth-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .auth-tabs button {
      flex: 1;
      min-height: 44px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
    }

    .auth-tabs button.is-active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .auth-panel.is-hidden {
      display: none;
    }

    .auth-gate .form-group {
      margin-bottom: 1rem;
    }

    .auth-gate .form-group label {
      display: block;
      margin-bottom: 0.35rem;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .auth-gate .form-group input {
      width: 100%;
      min-height: 44px;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .auth-gate .btn-auth {
      width: 100%;
      min-height: 44px;
      margin-top: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .auth-gate .btn-auth:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .auth-gate .btn-auth:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="app">
    <section id="auth-gate" class="auth-gate" aria-labelledby="auth-gate-heading">
      <header class="header">
        <h1 id="auth-gate-heading">図書館保守システム</h1>
        <p>メールアドレスとパスワードでログインしてください</p>
      </header>

      <div class="auth-tabs" role="tablist" aria-label="認証モード">
        <button type="button" id="auth-tab-login" class="is-active" role="tab" aria-selected="true" aria-controls="auth-panel-login">ログイン</button>
        <button type="button" id="auth-tab-signup" role="tab" aria-selected="false" aria-controls="auth-panel-signup">新規登録</button>
      </div>

      <div id="auth-panel-login" class="card auth-panel" role="tabpanel" aria-labelledby="auth-tab-login">
        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="login-email">メールアドレス</label>
            <input type="email" id="login-email" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label for="login-password">パスワード</label>
            <input type="password" id="login-password" autocomplete="current-password" required />
          </div>
          <button type="submit" id="login-submit" class="btn-auth">ログイン</button>
        </form>
      </div>

      <div id="auth-panel-signup" class="card auth-panel is-hidden" role="tabpanel" aria-labelledby="auth-tab-signup" hidden>
        <form id="signup-form" novalidate>
          <div class="form-group">
            <label for="signup-email">メールアドレス</label>
            <input type="email" id="signup-email" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label for="signup-name">氏名</label>
            <input type="text" id="signup-name" autocomplete="name" placeholder="例：山田 太郎" required />
          </div>
          <div class="form-group">
            <label for="signup-password">パスワード</label>
            <input type="password" id="signup-password" autocomplete="new-password" required />
            <span class="form-hint">6文字以上</span>
          </div>
          <button type="submit" id="signup-submit" class="btn-auth">登録する</button>
        </form>
      </div>
    </section>

    <div id="app-main" class="is-hidden">
    <div id="auth-bar"></div>
    <div id="global-nav"></div>

    <header class="header">
      <h1>貸出・返却</h1>
      <p>図書の貸出登録と返却処理</p>
    </header>

    <div id="message" class="message" role="status" aria-live="polite"></div>

    <section class="loan-summary" aria-labelledby="summary-heading">
      <h2 id="summary-heading" class="loan-summary__title">貸出状況サマリー</h2>
      <div class="loan-summary__grid">
        <div class="loan-summary__item">
          <span class="loan-summary__label">貸出中</span>
          <span class="loan-summary__value" id="summary-active-count">—</span>
        </div>
        <div class="loan-summary__item">
          <span class="loan-summary__label">延滞</span>
          <span class="loan-summary__value" id="summary-overdue-count">—</span>
          <div class="loan-summary__actions">
            <button type="button" id="summary-overdue-csv-btn" class="loan-summary__link">延滞リスト(CSV)</button>
          </div>
        </div>
        <div class="loan-summary__item">
          <span class="loan-summary__label">返却予定が近い（3日以内）</span>
          <span class="loan-summary__value" id="summary-due-soon-count">—</span>
          <div class="loan-summary__actions">
            <button type="button" id="summary-due-soon-csv-btn" class="loan-summary__link">返却予定リスト(CSV)</button>
          </div>
        </div>
        <div class="loan-summary__item">
          <span class="loan-summary__label">また貸し</span>
          <span class="loan-summary__value" id="summary-sub-lend-count">—</span>
          <div class="loan-summary__actions">
            <button type="button" id="summary-sub-lend-csv-btn" class="loan-summary__link">また貸しリスト(CSV)</button>
          </div>
        </div>
      </div>
    </section>

    <section class="card" aria-labelledby="lend-heading">
      <div class="card-header">
        <h2 id="lend-heading">貸出登録</h2>
        <p class="card-header__hint">条件を選択して図書と学生を指定してください</p>
        <p id="operator-hint" class="card-header__hint"></p>
      </div>

      <form id="lend-form" novalidate>
        <div class="lend-panels">
          <section class="lend-panel lend-panel--book" aria-labelledby="lend-book-heading">
            <h3 id="lend-book-heading" class="lend-panel__title">図書を指定</h3>
            <div class="lend-panel__fields">
              <div class="form-group">
                <label for="book-category-filter">図書カテゴリ</label>
                <select id="book-category-filter" aria-label="図書カテゴリで絞り込み">
                  <option value="">すべて</option>
                </select>
              </div>
              <div class="form-group">
                <label for="book-id">図書 <span aria-hidden="true">*</span></label>
                <select id="book-id" name="book_id" required>
                  <option value="">選択してください</option>
                </select>
              </div>
            </div>
            <span class="form-hint">貸出中の図書は選択できません。先に返却してください。</span>
          </section>

          <section class="lend-panel lend-panel--student" aria-labelledby="lend-student-heading">
            <h3 id="lend-student-heading" class="lend-panel__title">学生を指定</h3>
            <div class="lend-panel__fields">
              <div class="form-group">
                <label for="lend-faculty-filter">学部</label>
                <select id="lend-faculty-filter" aria-label="学部で絞り込み">
                  <option value="">すべて</option>
                </select>
              </div>
              <div class="form-group">
                <label for="lend-department-filter">学科</label>
                <select id="lend-department-filter" aria-label="学科で絞り込み" disabled>
                  <option value="">すべて</option>
                </select>
              </div>
              <div class="form-group">
                <label for="student-number">学生 <span aria-hidden="true">*</span></label>
                <select id="student-number" name="student_number" required>
                  <option value="">選択してください</option>
                </select>
              </div>
            </div>
            <span class="form-hint">公式借り手・実保持者（また貸し）の両方を含め、1人の学生が同時に借りられる図書は5冊まで</span>
          </section>
        </div>
        <div class="form-actions">
          <button type="submit" id="lend-btn" class="btn btn-primary">貸出する</button>
        </div>
      </form>
    </section>

    <section class="card" aria-labelledby="list-heading">
      <h2 id="list-heading">貸し出し履歴</h2>

      <div class="list-toolbar list-toolbar--status">
        <div class="form-group">
          <label for="status-filter">状態で絞り込み</label>
          <select id="status-filter" aria-label="返却状態で絞り込み">
            <option value="">すべて</option>
            <option value="lending" selected>貸出中のみ</option>
            <option value="due_soon">返却予定が近い</option>
            <option value="overdue">延滞のみ</option>
            <option value="sub_lend">また貸しのみ</option>
            <option value="returned">返却済みのみ</option>
          </select>
        </div>
        <div class="list-toolbar__actions">
          <button type="button" id="export-due-soon-csv-btn" class="btn btn-secondary">返却予定リスト(CSV)</button>
          <button type="button" id="export-overdue-csv-btn" class="btn btn-secondary">延滞リスト(CSV)</button>
          <button type="button" id="export-sub-lend-csv-btn" class="btn btn-secondary">また貸しリスト(CSV)</button>
        </div>
      </div>

      <div class="search-panels">
        <section class="search-panel search-panel--book" aria-labelledby="search-book-heading">
          <h3 id="search-book-heading" class="search-panel__title">図書で検索</h3>
          <div class="search-panel__fields search-panel__fields--book">
            <div class="form-group">
              <label for="search-book-title">図書名</label>
              <input type="search" id="search-book-title" placeholder="部分一致" aria-label="図書名で検索" />
            </div>
            <div class="form-group">
              <label for="search-book-author">著者</label>
              <input type="search" id="search-book-author" placeholder="部分一致" aria-label="著者で検索" />
            </div>
          </div>
        </section>
        <section class="search-panel search-panel--student" aria-labelledby="search-student-heading">
          <h3 id="search-student-heading" class="search-panel__title">学生で検索</h3>
          <div class="search-panel__fields">
            <div class="form-group">
              <label for="search-student-name">氏名</label>
              <input type="search" id="search-student-name" placeholder="部分一致" aria-label="氏名で検索" />
            </div>
          </div>
        </section>
      </div>

      <p id="list-count" class="list-count"></p>
      <div id="history-list" class="table-wrap">
        <p class="loading">読み込み中…</p>
      </div>
    </section>

    <div id="sub-lend-dialog" class="sub-lend-dialog is-hidden" role="dialog" aria-modal="true" aria-labelledby="sub-lend-dialog-title" hidden>
      <div class="sub-lend-dialog__panel">
        <h3 id="sub-lend-dialog-title">また貸しを記録</h3>
        <p id="sub-lend-dialog-desc" class="sub-lend-dialog__desc"></p>
        <div class="form-group">
          <label for="sub-lend-holder">実際の保持者 <span aria-hidden="true">*</span></label>
          <select id="sub-lend-holder" required>
            <option value="">選択してください</option>
          </select>
        </div>
        <div class="form-group">
          <label for="sub-lend-note">メモ（任意）</label>
          <textarea id="sub-lend-note" rows="2" placeholder="例：友人に渡した"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" id="sub-lend-cancel" class="btn btn-secondary">キャンセル</button>
          <button type="button" id="sub-lend-submit" class="btn btn-primary">記録する</button>
        </div>
      </div>
    </div>
    </div>
  </div>

  <script>
    // .env.local と同じ値に設定してください
    const HISTORY_TABLE = "libraly_app_lending_history";
    const BOOK_TABLE = "libraly_app";
    const STUDENT_TABLE = "libraly_app_student";
    const CATEGORY_TABLE = "libraly_app_category";
    const FACULTY_TABLE = "libraly_app_faculty";
    const DEPARTMENT_TABLE = "libraly_app_department";
    const MESSAGE_HIDE_MS = 4000;
    const MAX_ACTIVE_LOANS_PER_STUDENT = 5;
    const DUE_SOON_DAYS = 3;

    let messageTimer = null;
    let isBusy = false;
    let booksCache = [];
    let studentsCache = [];
    let categoriesCache = [];
    let facultiesCache = [];
    let departmentsCache = [];
    let historyCache = [];
    let statusFilter = "lending";
    let searchBookTitle = "";
    let searchBookAuthor = "";
    let searchStudentName = "";
    let bookCategoryFilter = "";
    let lendFacultyFilter = "";
    let lendDepartmentFilter = "";
    let currentStaff = null;
    let subLendTargetId = null;

    const messageEl = document.getElementById("message");
    const operatorHintEl = document.getElementById("operator-hint");
    const lendForm = document.getElementById("lend-form");
    const bookCategoryFilterEl = document.getElementById("book-category-filter");
    const bookSelect = document.getElementById("book-id");
    const lendFacultyFilterEl = document.getElementById("lend-faculty-filter");
    const lendDepartmentFilterEl = document.getElementById("lend-department-filter");
    const studentSelect = document.getElementById("student-number");
    const lendBtn = document.getElementById("lend-btn");
    const statusFilterEl = document.getElementById("status-filter");
    const searchBookTitleInput = document.getElementById("search-book-title");
    const searchBookAuthorInput = document.getElementById("search-book-author");
    const searchStudentNameInput = document.getElementById("search-student-name");
    const listCountEl = document.getElementById("list-count");
    const historyListEl = document.getElementById("history-list");
    const exportOverdueCsvBtn = document.getElementById("export-overdue-csv-btn");
    const exportDueSoonCsvBtn = document.getElementById("export-due-soon-csv-btn");
    const summaryActiveCountEl = document.getElementById("summary-active-count");
    const summaryOverdueCountEl = document.getElementById("summary-overdue-count");
    const summaryDueSoonCountEl = document.getElementById("summary-due-soon-count");
    const summaryOverdueCsvBtn = document.getElementById("summary-overdue-csv-btn");
    const summaryDueSoonCsvBtn = document.getElementById("summary-due-soon-csv-btn");
    const summarySubLendCountEl = document.getElementById("summary-sub-lend-count");
    const summarySubLendCsvBtn = document.getElementById("summary-sub-lend-csv-btn");
    const exportSubLendCsvBtn = document.getElementById("export-sub-lend-csv-btn");
    const subLendDialogEl = document.getElementById("sub-lend-dialog");
    const subLendDialogDescEl = document.getElementById("sub-lend-dialog-desc");
    const subLendHolderSelect = document.getElementById("sub-lend-holder");
    const subLendNoteInput = document.getElementById("sub-lend-note");
    const subLendCancelBtn = document.getElementById("sub-lend-cancel");
    const subLendSubmitBtn = document.getElementById("sub-lend-submit");

    function escapeHtml(str) {
      if (str == null) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function showMessage(text, type) {
      if (messageTimer) clearTimeout(messageTimer);
      messageEl.textContent = text;
      messageEl.className = "message is-visible message--" + type;
      if (type !== "error") {
        messageTimer = setTimeout(function () {
          messageEl.classList.remove("is-visible");
        }, MESSAGE_HIDE_MS);
      }
    }

    function setBusy(busy) {
      isBusy = busy;
      lendBtn.disabled = busy || !currentStaff;
    }

    function getProcessorName(staff) {
      if (staff && staff.name) return staff.name;
      return "—";
    }

    function updateOperatorHint() {
      if (currentStaff) {
        operatorHintEl.textContent =
          "担当者: " + currentStaff.name + "（ログインに紐づく担当者を自動記録）";
      } else {
        operatorHintEl.textContent =
          "担当者が未登録のため、貸出・返却はできません。マスタ保守の担当者マスタで登録してください。";
      }
    }

    async function loadCurrentStaff() {
      currentStaff = await LibralyAuth.getCurrentStaff();
      updateOperatorHint();
      setBusy(isBusy);
      return !!currentStaff;
    }

    function formatDateTime(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      if (isNaN(d.getTime())) return "—";
      return d.toLocaleString("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function formatDateOnly(value) {
      if (!value) return "—";
      if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
        const parts = value.split("-");
        return parts[0] + "/" + parts[1] + "/" + parts[2];
      }
      const d = new Date(value);
      if (isNaN(d.getTime())) return "—";
      return d.toLocaleDateString("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      });
    }

    function toDateInputValue(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + day;
    }

    function addDays(date, days) {
      const d = new Date(date.getTime());
      d.setDate(d.getDate() + days);
      return d;
    }

    /** 貸出登録用: 貸出日=当日、返却予定日=14日後 */
    function getLendRecordDates() {
      const today = new Date();
      return {
        lentAt: today.toISOString(),
        dueDate: toDateInputValue(addDays(today, 14)),
      };
    }

    /** 返却処理用: 返却日=当日 */
    function getReturnDateValue() {
      return toDateInputValue(new Date()) + "T00:00:00";
    }

    /** 延滞判定: 未返却かつ返却予定日 < 今日（日付文字列 YYYY-MM-DD で比較） */
    function isOverdue(record) {
      if (!record || record.is_returned || !record.due_date) return false;
      return record.due_date < toDateInputValue(new Date());
    }

    /** 返却予定が近い: 未返却・未延滞・返却予定日が今日〜DUE_SOON_DAYS 日後 */
    function isDueSoon(record) {
      if (!record || record.is_returned || !record.due_date) return false;
      if (isOverdue(record)) return false;
      const today = toDateInputValue(new Date());
      const limit = toDateInputValue(addDays(new Date(), DUE_SOON_DAYS));
      return record.due_date >= today && record.due_date <= limit;
    }

    function getOverdueDays(record) {
      if (!isOverdue(record) || !record.due_date) return null;
      const today = toDateInputValue(new Date());
      const due = new Date(record.due_date + "T00:00:00");
      const now = new Date(today + "T00:00:00");
      return Math.floor((now.getTime() - due.getTime()) / 86400000);
    }

    function getDaysUntilDue(record) {
      if (record.is_returned || !record.due_date || isOverdue(record)) return null;
      const today = toDateInputValue(new Date());
      const due = new Date(record.due_date + "T00:00:00");
      const now = new Date(today + "T00:00:00");
      return Math.floor((due.getTime() - now.getTime()) / 86400000);
    }

    function formatDaysColumn(record) {
      const overdueDays = getOverdueDays(record);
      if (overdueDays != null) return "延滞 " + overdueDays + " 日";
      const until = getDaysUntilDue(record);
      if (until != null && isDueSoon(record)) return "残り " + until + " 日";
      return "—";
    }

    function getActiveLendingRecords() {
      return historyCache.filter(function (h) {
        return !h.is_returned;
      });
    }

    function getDueSoonRecords() {
      return historyCache.filter(isDueSoon);
    }

    function getSubLendRecords() {
      return historyCache.filter(function (h) {
        return !h.is_returned && h.is_sub_lend;
      });
    }

    function updateLoanSummary() {
      const active = getActiveLendingRecords().length;
      const overdue = getOverdueRecords().length;
      const dueSoon = getDueSoonRecords().length;
      const subLend = getSubLendRecords().length;
      summaryActiveCountEl.textContent = String(active);
      summaryOverdueCountEl.textContent = String(overdue);
      summaryDueSoonCountEl.textContent = String(dueSoon);
      summarySubLendCountEl.textContent = String(subLend);
    }

    function downloadCsvFile(filename, header, rows, emptyMessage) {
      if (rows.length === 0) {
        showMessage(emptyMessage, "warn");
        return;
      }
      const lines = [header.map(escapeCsvField).join(",")];
      rows.forEach(function (cells) {
        lines.push(cells.map(escapeCsvField).join(","));
      });
      const blob = new Blob(["\uFEFF" + lines.join("\r\n")], {
        type: "text/csv;charset=utf-8",
      });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    function getOverdueRecords() {
      return historyCache.filter(isOverdue);
    }

    function getActiveLoanBookIds() {
      const ids = {};
      historyCache.forEach(function (h) {
        if (!h.is_returned) ids[h.book_id] = true;
      });
      return ids;
    }

    function countActiveLoansForStudent(studentNumber) {
      let count = 0;
      historyCache.forEach(function (h) {
        if (h.is_returned) return;
        if (h.student_number === studentNumber) count += 1;
        if (h.is_sub_lend && h.actual_holder_student_number === studentNumber) count += 1;
      });
      return count;
    }

    function getBookCategoryName(book) {
      if (book.libraly_app_category && book.libraly_app_category.name) {
        return book.libraly_app_category.name;
      }
      return "未設定";
    }

    function formatBookSelectLabel(book, onLoan) {
      let label =
        book.title + "（" + getBookCategoryName(book) + "）（" + book.name + "）";
      if (onLoan) label += " — 貸出中";
      return label;
    }


    function getBooksForLendSelect() {
      let list = booksCache.slice();
      if (bookCategoryFilter === "__none__") {
        list = list.filter(function (b) {
          return !b.category_id;
        });
      } else if (bookCategoryFilter) {
        list = list.filter(function (b) {
          return b.category_id === bookCategoryFilter;
        });
      }
      return list;
    }

    function getStudentDepartmentId(student) {
      if (student.department_id) return student.department_id;
      const dept = student.libraly_app_department;
      return dept && dept.id ? dept.id : "";
    }

    function getStudentFacultyId(student) {
      const dept = student.libraly_app_department;
      if (dept && dept.faculty_id) return dept.faculty_id;
      if (dept && dept.libraly_app_faculty && dept.libraly_app_faculty.id) {
        return dept.libraly_app_faculty.id;
      }
      const departmentId = getStudentDepartmentId(student);
      if (!departmentId) return "";
      const d = departmentsCache.find(function (x) {
        return x.id === departmentId;
      });
      return d ? d.faculty_id : "";
    }

    function getStudentsForLendSelect() {
      let list = studentsCache.slice();
      if (lendDepartmentFilter) {
        list = list.filter(function (s) {
          return getStudentDepartmentId(s) === lendDepartmentFilter;
        });
      } else if (lendFacultyFilter) {
        list = list.filter(function (s) {
          return getStudentFacultyId(s) === lendFacultyFilter;
        });
      }
      return list;
    }

    function populateBookCategoryFilter() {
      const current = bookCategoryFilterEl.value;
      bookCategoryFilterEl.innerHTML =
        '<option value="">すべて</option>' +
        '<option value="__none__">未設定</option>';
      categoriesCache.forEach(function (c) {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = c.name;
        bookCategoryFilterEl.appendChild(opt);
      });
      if (
        current &&
        bookCategoryFilterEl.querySelector('option[value="' + current + '"]')
      ) {
        bookCategoryFilterEl.value = current;
      }
      bookCategoryFilter = bookCategoryFilterEl.value;
    }

    function populateLendFacultyFilter() {
      const current = lendFacultyFilterEl.value;
      lendFacultyFilterEl.innerHTML = '<option value="">すべて</option>';
      facultiesCache.forEach(function (f) {
        const opt = document.createElement("option");
        opt.value = f.id;
        opt.textContent = f.name;
        lendFacultyFilterEl.appendChild(opt);
      });
      if (
        current &&
        lendFacultyFilterEl.querySelector('option[value="' + current + '"]')
      ) {
        lendFacultyFilterEl.value = current;
      }
      lendFacultyFilter = lendFacultyFilterEl.value;
    }

    function populateLendDepartmentFilter() {
      const current = lendDepartmentFilterEl.value;
      lendDepartmentFilterEl.innerHTML = '<option value="">すべて</option>';

      if (!lendFacultyFilter) {
        lendDepartmentFilterEl.disabled = true;
        lendDepartmentFilterEl.value = "";
        lendDepartmentFilter = "";
        return;
      }

      lendDepartmentFilterEl.disabled = false;
      departmentsCache
        .filter(function (d) {
          return d.faculty_id === lendFacultyFilter;
        })
        .forEach(function (d) {
          const opt = document.createElement("option");
          opt.value = d.id;
          opt.textContent = d.name;
          lendDepartmentFilterEl.appendChild(opt);
        });

      if (
        current &&
        lendDepartmentFilterEl.querySelector('option[value="' + current + '"]')
      ) {
        lendDepartmentFilterEl.value = current;
      } else {
        lendDepartmentFilterEl.value = "";
      }
      lendDepartmentFilter = lendDepartmentFilterEl.value;
    }

    function populateBookSelect() {
      const activeIds = getActiveLoanBookIds();
      const current = bookSelect.value;
      const books = getBooksForLendSelect();
      bookSelect.innerHTML = '<option value="">選択してください</option>';

      books.forEach(function (b) {
        const opt = document.createElement("option");
        opt.value = b.id;
        const onLoan = !!activeIds[b.id];
        opt.textContent = formatBookSelectLabel(b, onLoan);
        opt.disabled = onLoan;
        bookSelect.appendChild(opt);
      });

      if (current && bookSelect.querySelector('option[value="' + current + '"]:not([disabled])')) {
        bookSelect.value = current;
      } else {
        bookSelect.value = "";
      }
    }

    function getStudentFacultyName(student) {
      const dept = student.libraly_app_department;
      if (dept && dept.libraly_app_faculty && dept.libraly_app_faculty.name) {
        return dept.libraly_app_faculty.name;
      }
      return "";
    }

    function getStudentDepartmentName(student) {
      const dept = student.libraly_app_department;
      if (dept && dept.name) return dept.name;
      return "";
    }

    function formatStudentSelectLabel(student) {
      let label = student.student_number + " — " + student.name;
      const faculty = getStudentFacultyName(student);
      const department = getStudentDepartmentName(student);
      if (faculty && department) {
        label += "（" + faculty + " / " + department + "）";
      } else if (faculty || department) {
        label += "（" + (faculty || department) + "）";
      }
      return label;
    }

    function populateStudentSelect() {
      const current = studentSelect.value;
      const students = getStudentsForLendSelect();
      studentSelect.innerHTML = '<option value="">選択してください</option>';

      students.forEach(function (s) {
        const opt = document.createElement("option");
        opt.value = s.student_number;
        opt.textContent = formatStudentSelectLabel(s);
        studentSelect.appendChild(opt);
      });

      if (current && studentSelect.querySelector('option[value="' + current + '"]')) {
        studentSelect.value = current;
      } else {
        studentSelect.value = "";
      }
    }

    function getBookTitle(record) {
      const book = record.libraly_app;
      if (book && book.title) return book.title;
      const found = booksCache.find(function (b) {
        return b.id === record.book_id;
      });
      return found ? found.title : "（不明）";
    }

    function getBookAuthor(record) {
      const book = record.libraly_app;
      if (book && book.name) return book.name;
      const found = booksCache.find(function (b) {
        return b.id === record.book_id;
      });
      return found ? found.name : "—";
    }

    function getStudentName(record) {
      const student = record.libraly_app_student;
      if (student && student.name) return student.name;
      const found = studentsCache.find(function (s) {
        return s.student_number === record.student_number;
      });
      return found ? found.name : "（不明）";
    }

    function getActualHolderName(record) {
      if (!record.is_sub_lend || !record.actual_holder_student_number) return "—";
      if (record.actual_holder && record.actual_holder.name) return record.actual_holder.name;
      const found = studentsCache.find(function (s) {
        return s.student_number === record.actual_holder_student_number;
      });
      return found ? found.name : record.actual_holder_student_number;
    }

    function getActualHolderDisplay(record) {
      if (!record.is_sub_lend || !record.actual_holder_student_number) return "—";
      return (
        record.actual_holder_student_number + " — " + getActualHolderName(record)
      );
    }

    function matchesSearchField(value, query) {
      if (!query) return true;
      return String(value).toLowerCase().indexOf(query.toLowerCase()) !== -1;
    }

    function readSearchFilters() {
      searchBookTitle = searchBookTitleInput.value.trim();
      searchBookAuthor = searchBookAuthorInput.value.trim();
      searchStudentName = searchStudentNameInput.value.trim();
    }

    function escapeCsvField(value) {
      if (value == null) return "";
      const s = String(value);
      if (/[",\r\n]/.test(s)) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }

    function exportOverdueCsv() {
      const records = getOverdueRecords();
      const today = toDateInputValue(new Date());
      downloadCsvFile(
        "延滞リスト_" + today + ".csv",
        [
          "状態",
          "延滞日数",
          "図書",
          "著者",
          "学籍番号",
          "氏名",
          "貸し出し日",
          "返却予定日",
          "貸出処理者",
        ],
        records.map(function (h) {
          return [
            "延滞",
            getOverdueDays(h),
            getBookTitle(h),
            getBookAuthor(h),
            h.student_number,
            getStudentName(h),
            formatDateOnly(h.created_at),
            formatDateOnly(h.due_date),
            getProcessorName(h.lent_staff),
          ];
        }),
        "延滞中の履歴がありません。CSVは出力されませんでした。"
      );
      if (records.length > 0) {
        showMessage("延滞リストを CSV で出力しました（" + records.length + " 件）。", "success");
      }
    }

    function exportDueSoonCsv() {
      const records = getDueSoonRecords();
      const today = toDateInputValue(new Date());
      downloadCsvFile(
        "返却予定リスト_" + today + ".csv",
        [
          "状態",
          "残り日数",
          "図書",
          "著者",
          "学籍番号",
          "氏名",
          "貸し出し日",
          "返却予定日",
          "貸出処理者",
        ],
        records.map(function (h) {
          return [
            "期限間近",
            getDaysUntilDue(h),
            getBookTitle(h),
            getBookAuthor(h),
            h.student_number,
            getStudentName(h),
            formatDateOnly(h.created_at),
            formatDateOnly(h.due_date),
            getProcessorName(h.lent_staff),
          ];
        }),
        "返却予定が近い履歴がありません。CSVは出力されませんでした。"
      );
      if (records.length > 0) {
        showMessage(
          "返却予定リストを CSV で出力しました（" + records.length + " 件）。",
          "success"
        );
      }
    }

    function exportSubLendCsv() {
      const records = getSubLendRecords();
      const today = toDateInputValue(new Date());
      downloadCsvFile(
        "また貸しリスト_" + today + ".csv",
        [
          "図書",
          "著者",
          "公式学籍番号",
          "公式氏名",
          "実保持者学籍番号",
          "実保持者氏名",
          "貸し出し日",
          "返却予定日",
          "メモ",
          "記録日時",
          "記録担当者",
        ],
        records.map(function (h) {
          return [
            getBookTitle(h),
            getBookAuthor(h),
            h.student_number,
            getStudentName(h),
            h.actual_holder_student_number,
            getActualHolderName(h),
            formatDateOnly(h.created_at),
            formatDateOnly(h.due_date),
            h.sub_lend_note || "",
            formatDateTime(h.sub_lend_recorded_at),
            getProcessorName(h.sub_lend_staff),
          ];
        }),
        "また貸し中の履歴がありません。CSVは出力されませんでした。"
      );
      if (records.length > 0) {
        showMessage(
          "また貸しリストを CSV で出力しました（" + records.length + " 件）。",
          "success"
        );
      }
    }

    function populateSubLendHolderSelect(officialStudentNumber) {
      subLendHolderSelect.innerHTML = '<option value="">選択してください</option>';
      studentsCache.forEach(function (s) {
        if (s.student_number === officialStudentNumber) return;
        const opt = document.createElement("option");
        opt.value = s.student_number;
        opt.textContent = s.student_number + " — " + s.name;
        subLendHolderSelect.appendChild(opt);
      });
    }

    function openSubLendDialog(historyId) {
      const record = historyCache.find(function (h) {
        return h.id === historyId;
      });
      if (!record || record.is_returned || record.is_sub_lend) return;

      subLendTargetId = historyId;
      subLendNoteInput.value = "";
      subLendDialogDescEl.textContent =
        "「" +
        getBookTitle(record) +
        "」（公式借り手: " +
        getStudentName(record) +
        "）の実際の保持者を記録します。公式借り手は変更されません。";
      populateSubLendHolderSelect(record.student_number);
      subLendDialogEl.classList.remove("is-hidden");
      subLendDialogEl.hidden = false;
      subLendHolderSelect.focus();
    }

    function closeSubLendDialog() {
      subLendTargetId = null;
      subLendDialogEl.classList.add("is-hidden");
      subLendDialogEl.hidden = true;
      subLendHolderSelect.innerHTML = '<option value="">選択してください</option>';
      subLendNoteInput.value = "";
    }

    async function recordSubLend() {
      if (!currentStaff) {
        showMessage(
          "担当者が未登録です。マスタ保守の担当者マスタで、ログインメールと一致する担当者を登録してください。",
          "error"
        );
        return;
      }

      const holderNumber = subLendHolderSelect.value;
      const note = subLendNoteInput.value.trim();

      if (!subLendTargetId) return;

      const record = historyCache.find(function (h) {
        return h.id === subLendTargetId;
      });

      if (!record || record.is_returned || record.is_sub_lend) {
        showMessage("対象の履歴が見つからないか、すでに返却・記録済みです。", "warn");
        closeSubLendDialog();
        return;
      }

      if (!holderNumber) {
        showMessage("実際の保持者を選択してください。", "warn");
        return;
      }

      if (holderNumber === record.student_number) {
        showMessage("実保持者は公式借り手と異なる学生を選択してください。", "warn");
        return;
      }

      if (countActiveLoansForStudent(holderNumber) >= MAX_ACTIVE_LOANS_PER_STUDENT) {
        showMessage(
          "実保持者はすでに5冊の上限に達しています。返却または記録の見直しをしてください。",
          "error"
        );
        return;
      }

      setBusy(true);

      try {
        const { error } = await supabaseClient
          .from(HISTORY_TABLE)
          .update({
            is_sub_lend: true,
            actual_holder_student_number: holderNumber,
            sub_lend_note: note || null,
            sub_lend_recorded_at: new Date().toISOString(),
            sub_lend_recorded_by_staff_id: currentStaff.id,
          })
          .eq("id", subLendTargetId);

        if (error) {
          console.error(error);
          showMessage(
            "また貸しの記録に失敗しました。DBマイグレーション（20260615_add_sub_lend_fields.sql）を実行済みか確認してください。",
            "error"
          );
          return;
        }

        closeSubLendDialog();
        showMessage("また貸しを記録しました。", "success");
        await loadHistory();
      } finally {
        setBusy(false);
      }
    }

    function getFilteredHistory() {
      let list = historyCache.slice();

      if (statusFilter === "lending") {
        list = list.filter(function (h) {
          return !h.is_returned;
        });
      } else if (statusFilter === "due_soon") {
        list = list.filter(isDueSoon);
      } else if (statusFilter === "overdue") {
        list = list.filter(function (h) {
          return isOverdue(h);
        });
      } else if (statusFilter === "returned") {
        list = list.filter(function (h) {
          return h.is_returned;
        });
      } else if (statusFilter === "sub_lend") {
        list = list.filter(function (h) {
          return !h.is_returned && h.is_sub_lend;
        });
      }

      if (searchBookTitle || searchBookAuthor || searchStudentName) {
        list = list.filter(function (h) {
          return (
            matchesSearchField(getBookTitle(h), searchBookTitle) &&
            matchesSearchField(getBookAuthor(h), searchBookAuthor) &&
            (matchesSearchField(getStudentName(h), searchStudentName) ||
              matchesSearchField(getActualHolderName(h), searchStudentName))
          );
        });
      }

      return list;
    }

    function renderHistoryList() {
      updateLoanSummary();

      if (historyCache.length === 0) {
        listCountEl.textContent = "";
        historyListEl.innerHTML =
          '<p class="empty-state">貸し出し履歴がありません。<br>上のフォームから貸出を登録してください。</p>';
        return;
      }

      const filtered = getFilteredHistory();
      listCountEl.textContent =
        "表示：" + filtered.length + " 件 / 全 " + historyCache.length + " 件";

      if (filtered.length === 0) {
        historyListEl.innerHTML =
          '<p class="empty-state">条件に一致する履歴がありません。<br>絞り込みや検索条件を変更してください。</p>';
        return;
      }

      historyListEl.innerHTML =
        '<table class="history-table">' +
        "<thead><tr>" +
        "<th>状態</th><th>日数</th><th>図書</th><th>著者</th><th>学籍番号</th><th>氏名</th><th>実保持者</th><th>貸し出し日</th><th>返却予定日</th><th>返却日</th><th>貸出処理者</th><th>返却処理者</th><th>操作</th>" +
        "</tr></thead><tbody>" +
        filtered
          .map(function (h) {
            const statusBadge = h.is_returned
              ? '<span class="badge badge--returned">返却済み</span>'
              : isOverdue(h)
                ? '<span class="badge badge--overdue">延滞</span>'
                : isDueSoon(h)
                  ? '<span class="badge badge--due-soon">期限間近</span>'
                  : '<span class="badge badge--lending">貸出中</span>';
            const subLendBadge =
              h.is_sub_lend && !h.is_returned
                ? '<span class="badge badge--sub-lend">また貸し</span>'
                : "";
            let actionCell = "—";
            if (!h.is_returned) {
              actionCell =
                '<button type="button" class="btn btn-return" data-action="return">返却</button>';
              if (!h.is_sub_lend) {
                actionCell +=
                  '<button type="button" class="btn btn-secondary btn-sub-lend" data-action="sub-lend">また貸しを記録</button>';
              }
            }

            return (
              "<tr data-id=\"" +
              escapeHtml(h.id) +
              "\">" +
              "<td>" +
              statusBadge +
              subLendBadge +
              "</td>" +
              "<td>" +
              escapeHtml(formatDaysColumn(h)) +
              "</td>" +
              "<td>" +
              escapeHtml(getBookTitle(h)) +
              "</td>" +
              "<td>" +
              escapeHtml(getBookAuthor(h)) +
              "</td>" +
              "<td>" +
              escapeHtml(h.student_number) +
              "</td>" +
              "<td>" +
              escapeHtml(getStudentName(h)) +
              "</td>" +
              "<td>" +
              escapeHtml(getActualHolderDisplay(h)) +
              "</td>" +
              "<td>" +
              escapeHtml(formatDateOnly(h.created_at)) +
              "</td>" +
              "<td>" +
              escapeHtml(formatDateOnly(h.due_date)) +
              "</td>" +
              "<td>" +
              escapeHtml(h.is_returned ? formatDateOnly(h.returned_at) : "—") +
              "</td>" +
              "<td>" +
              escapeHtml(getProcessorName(h.lent_staff)) +
              "</td>" +
              "<td>" +
              escapeHtml(getProcessorName(h.returned_staff)) +
              "</td>" +
              '<td class="actions">' +
              actionCell +
              "</td></tr>"
            );
          })
          .join("") +
        "</tbody></table>";
    }

    async function loadCategories() {
      const { data, error } = await supabaseClient
        .from(CATEGORY_TABLE)
        .select("id, name")
        .order("name", { ascending: true });

      if (error) {
        console.error(error);
        return false;
      }

      categoriesCache = data || [];
      populateBookCategoryFilter();
      return true;
    }

    async function loadFacultyDepartment() {
      const [facultyRes, deptRes] = await Promise.all([
        supabaseClient.from(FACULTY_TABLE).select("id, name").order("name", { ascending: true }),
        supabaseClient
          .from(DEPARTMENT_TABLE)
          .select("id, name, faculty_id")
          .order("name", { ascending: true }),
      ]);

      if (facultyRes.error || deptRes.error) {
        console.error(facultyRes.error || deptRes.error);
        return false;
      }

      facultiesCache = facultyRes.data || [];
      departmentsCache = deptRes.data || [];
      populateLendFacultyFilter();
      populateLendDepartmentFilter();
      return true;
    }

    async function loadBooks() {
      const { data, error } = await supabaseClient
        .from(BOOK_TABLE)
        .select("id, title, name, category_id, libraly_app_category ( name )")
        .order("title", { ascending: true });

      if (error) {
        console.error(error);
        showMessage("図書データの取得に失敗しました。", "error");
        return false;
      }

      booksCache = data || [];
      return true;
    }

    async function loadStudents() {
      const { data, error } = await supabaseClient
        .from(STUDENT_TABLE)
        .select(
          "student_number, name, department_id, " +
            "libraly_app_department ( id, name, faculty_id, libraly_app_faculty ( id, name ) )"
        )
        .order("student_number", { ascending: true });

      if (error) {
        console.error(error);
        showMessage("学生データの取得に失敗しました。", "error");
        return false;
      }

      studentsCache = data || [];
      return true;
    }

    async function loadHistory() {
      historyListEl.innerHTML = '<p class="loading">読み込み中…</p>';

      const { data, error } = await supabaseClient
        .from(HISTORY_TABLE)
        .select(
          "id, book_id, student_number, is_returned, due_date, returned_at, created_at, " +
            "lent_by_staff_id, returned_by_staff_id, " +
            "is_sub_lend, actual_holder_student_number, sub_lend_note, sub_lend_recorded_at, sub_lend_recorded_by_staff_id, " +
            "libraly_app ( id, title, name ), " +
            "libraly_app_student!libraly_app_lending_history_student_number_fkey ( student_number, name ), " +
            "actual_holder:libraly_app_student!libraly_app_lending_history_actual_holder_student_number_fkey ( student_number, name ), " +
            "lent_staff:libraly_app_staff!lent_by_staff_id ( name ), " +
            "returned_staff:libraly_app_staff!returned_by_staff_id ( name ), " +
            "sub_lend_staff:libraly_app_staff!sub_lend_recorded_by_staff_id ( name )"
        )
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        historyCache = [];
        historyListEl.innerHTML = "";
        listCountEl.textContent = "";
        updateLoanSummary();
        showMessage(
          "貸し出し履歴の取得に失敗しました。テーブルが作成されているか、また貸し用マイグレーション（sql/20260615_add_sub_lend_fields.sql）を実行済みか確認してください。",
          "error"
        );
        return false;
      }

      historyCache = data || [];
      populateBookSelect();
      renderHistoryList();
      return true;
    }

    async function lendBook() {
      if (!currentStaff) {
        showMessage(
          "担当者が未登録です。マスタ保守の担当者マスタで、ログインメールと一致する担当者を登録してください。",
          "error"
        );
        return;
      }

      const bookId = bookSelect.value;
      const studentNumber = studentSelect.value;

      if (!bookId || !studentNumber) {
        showMessage("図書と学生を選択してください。", "warn");
        return;
      }

      const lendDates = getLendRecordDates();

      const activeIds = getActiveLoanBookIds();
      if (activeIds[bookId]) {
        showMessage("この図書はすでに貸出中です。先に返却してください。", "warn");
        populateBookSelect();
        return;
      }

      if (countActiveLoansForStudent(studentNumber) >= MAX_ACTIVE_LOANS_PER_STUDENT) {
        showMessage(
          "この学生はすでに5冊貸出中です。返却してから再度貸出してください。",
          "error"
        );
        return;
      }

      setBusy(true);

      try {
        const { error } = await supabaseClient.from(HISTORY_TABLE).insert({
          book_id: bookId,
          student_number: studentNumber,
          is_returned: false,
          created_at: lendDates.lentAt,
          due_date: lendDates.dueDate,
          lent_by_staff_id: currentStaff.id,
        });

        if (error) {
          console.error(error);
          showMessage("貸出の登録に失敗しました。", "error");
          return;
        }

        lendForm.reset();
        showMessage("貸出を登録しました。", "success");
        await loadHistory();
      } finally {
        setBusy(false);
      }
    }

    async function returnBook(historyId) {
      if (!currentStaff) {
        showMessage(
          "担当者が未登録です。マスタ保守の担当者マスタで、ログインメールと一致する担当者を登録してください。",
          "error"
        );
        return;
      }

      const record = historyCache.find(function (h) {
        return h.id === historyId;
      });
      if (!record || record.is_returned) return;

      const bookTitle = getBookTitle(record);
      const studentName = getStudentName(record);
      const ok = window.confirm(
        "「" + bookTitle + "」を " + studentName + " さんから返却しますか？"
      );
      if (!ok) return;

      setBusy(true);

      try {
        const { error } = await supabaseClient
          .from(HISTORY_TABLE)
          .update({
            is_returned: true,
            returned_at: getReturnDateValue(),
            returned_by_staff_id: currentStaff.id,
          })
          .eq("id", historyId);

        if (error) {
          console.error(error);
          showMessage("返却処理に失敗しました。", "error");
          return;
        }

        showMessage("返却を登録しました。", "success");
        await loadHistory();
      } finally {
        setBusy(false);
      }
    }

    lendForm.addEventListener("submit", function (e) {
      e.preventDefault();
      if (!isBusy) lendBook();
    });

    bookCategoryFilterEl.addEventListener("change", function () {
      bookCategoryFilter = bookCategoryFilterEl.value;
      populateBookSelect();
    });

    lendFacultyFilterEl.addEventListener("change", function () {
      lendFacultyFilter = lendFacultyFilterEl.value;
      lendDepartmentFilter = "";
      populateLendDepartmentFilter();
      populateStudentSelect();
    });

    lendDepartmentFilterEl.addEventListener("change", function () {
      lendDepartmentFilter = lendDepartmentFilterEl.value;
      populateStudentSelect();
    });

    function onSearchInputChange() {
      readSearchFilters();
      renderHistoryList();
    }

    statusFilterEl.addEventListener("change", function () {
      statusFilter = statusFilterEl.value;
      renderHistoryList();
    });

    exportOverdueCsvBtn.addEventListener("click", exportOverdueCsv);
    exportDueSoonCsvBtn.addEventListener("click", exportDueSoonCsv);
    exportSubLendCsvBtn.addEventListener("click", exportSubLendCsv);
    summaryOverdueCsvBtn.addEventListener("click", exportOverdueCsv);
    summaryDueSoonCsvBtn.addEventListener("click", exportDueSoonCsv);
    summarySubLendCsvBtn.addEventListener("click", exportSubLendCsv);
    subLendCancelBtn.addEventListener("click", closeSubLendDialog);
    subLendSubmitBtn.addEventListener("click", recordSubLend);
    subLendDialogEl.addEventListener("click", function (e) {
      if (e.target === subLendDialogEl) closeSubLendDialog();
    });

    searchBookTitleInput.addEventListener("input", onSearchInputChange);
    searchBookAuthorInput.addEventListener("input", onSearchInputChange);
    searchStudentNameInput.addEventListener("input", onSearchInputChange);

    historyListEl.addEventListener("click", function (e) {
      const btn = e.target.closest("[data-action]");
      if (!btn || isBusy) return;

      const row = btn.closest("tr[data-id]");
      if (!row) return;

      const id = row.getAttribute("data-id");
      if (btn.getAttribute("data-action") === "return") {
        returnBook(id);
      } else if (btn.getAttribute("data-action") === "sub-lend") {
        openSubLendDialog(id);
      }
    });

    const supabaseClient = LibralyAuth.getClient();

    const authGateEl = document.getElementById("auth-gate");
    const appMainEl = document.getElementById("app-main");
    const authTabLogin = document.getElementById("auth-tab-login");
    const authTabSignup = document.getElementById("auth-tab-signup");
    const authPanelLogin = document.getElementById("auth-panel-login");
    const authPanelSignup = document.getElementById("auth-panel-signup");
    const loginForm = document.getElementById("login-form");
    const signupForm = document.getElementById("signup-form");
    const loginSubmitBtn = document.getElementById("login-submit");
    const signupSubmitBtn = document.getElementById("signup-submit");

    function showAuthGate() {
      authGateEl.classList.remove("is-hidden");
      appMainEl.classList.add("is-hidden");
      document.title = "ログイン | 図書館保守システム";
    }

    function showAppMain() {
      authGateEl.classList.add("is-hidden");
      appMainEl.classList.remove("is-hidden");
      document.title = "貸出・返却 | 図書館保守システム";
    }

    function setAuthTab(mode) {
      const isLogin = mode === "login";
      authTabLogin.classList.toggle("is-active", isLogin);
      authTabSignup.classList.toggle("is-active", !isLogin);
      authTabLogin.setAttribute("aria-selected", isLogin ? "true" : "false");
      authTabSignup.setAttribute("aria-selected", isLogin ? "false" : "true");
      authPanelLogin.classList.toggle("is-hidden", !isLogin);
      authPanelSignup.classList.toggle("is-hidden", isLogin);
      authPanelLogin.hidden = !isLogin;
      authPanelSignup.hidden = isLogin;
    }

    function readAuthCredentials(emailId, passwordId) {
      return {
        email: document.getElementById(emailId).value.trim(),
        password: document.getElementById(passwordId).value,
      };
    }

    function validateAuthInput(email, password) {
      if (!email) {
        alert("メールアドレスを入力してください。");
        return false;
      }
      if (!LibralyAuth.validatePassword(password)) {
        alert("パスワードは6文字以上で入力してください。");
        return false;
      }
      return true;
    }

    function validateSignupInput(email, name, password) {
      if (!validateAuthInput(email, password)) {
        return false;
      }
      if (!LibralyAuth.validateStaffName(name)) {
        alert("氏名を入力してください。");
        return false;
      }
      return true;
    }

    authTabLogin.addEventListener("click", function () {
      setAuthTab("login");
    });
    authTabSignup.addEventListener("click", function () {
      setAuthTab("signup");
    });

    loginForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      const cred = readAuthCredentials("login-email", "login-password");
      if (!validateAuthInput(cred.email, cred.password)) return;

      loginSubmitBtn.disabled = true;
      const { error } = await supabaseClient.auth.signInWithPassword(cred);
      loginSubmitBtn.disabled = false;

      if (error) {
        alert(LibralyAuth.authErrorMessage(error));
        return;
      }
      await startApp();
    });

    signupForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      const cred = readAuthCredentials("signup-email", "signup-password");
      const name = document.getElementById("signup-name").value;
      if (!validateSignupInput(cred.email, name, cred.password)) return;

      signupSubmitBtn.disabled = true;
      const signupResult = await LibralyAuth.signUpWithStaff({
        email: cred.email,
        password: cred.password,
        name: name,
      });
      signupSubmitBtn.disabled = false;

      if (signupResult.error) {
        alert(LibralyAuth.authErrorMessage(signupResult.error));
        return;
      }
      await startApp();
      if (signupResult.staffWarning) {
        showMessage(signupResult.staffWarning, "error");
      }
    });

    async function startApp() {
      showAppMain();
      await LibralyAuth.renderUserBar(document.getElementById("auth-bar"));
      LibralyNav.renderGlobalNav(
        document.getElementById("global-nav"),
        LibralyNav.SECTION_LENDING
      );

      const staffOk = await loadCurrentStaff();
      if (!staffOk) {
        showMessage(
          "担当者が未登録です。貸出・返却を行うには、マスタ保守の担当者マスタでログインメールと一致する担当者を登録してください。",
          "error"
        );
      }

      const [booksOk, studentsOk] = await Promise.all([
        loadBooks(),
        loadStudents(),
        loadCategories(),
        loadFacultyDepartment(),
      ]);
      populateStudentSelect();
      if (booksOk) populateBookSelect();

      if (!booksOk || !studentsOk) {
        historyListEl.innerHTML =
          '<p class="empty-state">マスタデータの読み込みに失敗したため、履歴を表示できません。</p>';
        return;
      }

      if (booksCache.length === 0) {
        showMessage(
          "図書が登録されていません。マスタ保守の図書マスタで登録してください。",
          "warn"
        );
      }
      if (studentsCache.length === 0) {
        showMessage(
          "学生が登録されていません。マスタ保守の学生マスタで登録してください。",
          "warn"
        );
      }

      await loadHistory();
    }

    (async function init() {
      const session = await LibralyAuth.getSession();
      if (!session) {
        showAuthGate();
        return;
      }
      await startApp();
    })();
  </script>
</body>
</html>
