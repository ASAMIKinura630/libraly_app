<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学部・学科マスタ保守 | マスタ保守 | 図書館保守システム</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #f4f1ea;
      --surface: #fffef9;
      --border: #d8d0c4;
      --text: #2c2416;
      --muted: #6b5f4f;
      --accent: #2d5a4a;
      --accent-hover: #234839;
      --danger: #9b3b32;
      --success-bg: #e8f3ec;
      --success-text: #1f5c38;
      --warn-bg: #fff6e5;
      --warn-text: #8a5a00;
      --error-bg: #fdecea;
      --error-text: #8b2e26;
      --shadow: 0 2px 12px rgba(44, 36, 22, 0.08);
      --radius: 10px;
      --max-width: 960px;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }

    .app {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 1.25rem 1rem 2.5rem;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .nav a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    .nav a:hover { text-decoration: underline; }

    .nav a[aria-current="page"] {
      color: var(--text);
      text-decoration: none;
      cursor: default;
    }

    .nav--return { margin-bottom: 0.35rem; }
    .nav--return a { font-size: 0.85rem; }

    .maintenance-banner {
      padding: 0.65rem 1rem;
      border-radius: var(--radius);
      background: var(--warn-bg);
      color: var(--warn-text);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .header { margin-bottom: 1rem; }
    .header h1 { margin: 0; font-size: 1.75rem; font-weight: 700; }
    .header p { margin: 0.35rem 0 0; color: var(--muted); font-size: 0.95rem; }

    .message {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    .message.is-visible { display: block; }
    .message--success { background: var(--success-bg); color: var(--success-text); }
    .message--warn { background: var(--warn-bg); color: var(--warn-text); }
    .message--error { background: var(--error-bg); color: var(--error-text); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .card h2 { margin: 0 0 1rem; font-size: 1.1rem; font-weight: 600; }

    .edit-hint {
      margin: 0 0 1rem;
      font-size: 0.85rem;
      color: var(--accent);
      display: none;
    }

    .edit-hint.is-visible { display: block; }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: flex-end;
    }

    .form-group {
      flex: 1;
      min-width: 160px;
      margin-bottom: 0;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.35rem;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      min-height: 44px;
      padding: 0.65rem 0.75rem;
      font-size: 1rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-color: var(--accent);
    }

    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0.5rem 1.25rem;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-edit {
      background: #e8eef5;
      color: #2a4365;
      padding: 0.35rem 0.75rem;
      min-height: 36px;
      font-size: 0.85rem;
    }

    .btn-delete {
      background: #fce8e6;
      color: var(--danger);
      padding: 0.35rem 0.75rem;
      min-height: 36px;
      font-size: 0.85rem;
    }

    .list-filter {
      margin-bottom: 1rem;
      max-width: 280px;
    }

    .table-wrap { overflow-x: auto; }

    .master-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .master-table th,
    .master-table td {
      padding: 0.65rem 0.5rem;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: middle;
    }

    .master-table th {
      font-weight: 600;
      background: #f8f6f1;
      white-space: nowrap;
    }

    .master-table tr.is-editing { background: rgba(45, 90, 74, 0.08); }

    .master-table .actions {
      white-space: nowrap;
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .empty-state,
    .loading {
      text-align: center;
      color: var(--muted);
      padding: 1.5rem 1rem;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="app">
    <nav class="nav nav--return" aria-label="業務画面への復帰">
      <a href="index.html">← 貸出・返却に戻る</a>
    </nav>
    <nav class="nav" aria-label="マスタ保守メニュー">
      <a href="admin.html">マスタ保守</a>
      <a href="books.html">図書</a>
      <a href="categories.html">カテゴリ</a>
      <a href="students.html">学生</a>
      <a href="masters.html" aria-current="page">学部・学科</a>
    </nav>

    <div class="maintenance-banner" role="note">
      マスタ保守モード — 学科の変更・削除は学生マスタに影響します
    </div>

    <header class="header">
      <h1>学部・学科マスタ保守</h1>
      <p>学部（親）と学科（子）の登録・一覧・編集・削除</p>
    </header>

    <div id="message" class="message" role="status" aria-live="polite"></div>

    <section class="card" aria-labelledby="faculty-heading">
      <h2 id="faculty-heading">学部マスタ</h2>
      <p id="faculty-edit-hint" class="edit-hint">学部を編集中です。変更して「更新」を押してください。</p>

      <form id="faculty-form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="faculty-name">学部名 <span aria-hidden="true">*</span></label>
            <input type="text" id="faculty-name" placeholder="例：工学部" required />
          </div>
          <div class="form-actions">
            <button type="submit" id="faculty-save-btn" class="btn btn-primary">保存</button>
            <button type="button" id="faculty-cancel-btn" class="btn btn-secondary" hidden>キャンセル</button>
          </div>
        </div>
      </form>

      <div id="faculty-list" class="table-wrap" style="margin-top: 1rem">
        <p class="loading">読み込み中…</p>
      </div>
    </section>

    <section class="card" aria-labelledby="department-heading">
      <h2 id="department-heading">学科マスタ</h2>
      <p id="department-edit-hint" class="edit-hint">学科を編集中です。変更して「更新」を押してください。</p>

      <form id="department-form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="dept-faculty-id">所属学部 <span aria-hidden="true">*</span></label>
            <select id="dept-faculty-id" required>
              <option value="">選択してください</option>
            </select>
          </div>
          <div class="form-group">
            <label for="department-name">学科名 <span aria-hidden="true">*</span></label>
            <input type="text" id="department-name" placeholder="例：情報工学科" required />
          </div>
          <div class="form-actions">
            <button type="submit" id="department-save-btn" class="btn btn-primary">保存</button>
            <button type="button" id="department-cancel-btn" class="btn btn-secondary" hidden>キャンセル</button>
          </div>
        </div>
      </form>

      <div class="list-filter form-group" style="margin-top: 1rem">
        <label for="dept-list-filter">学部で絞り込み</label>
        <select id="dept-list-filter">
          <option value="">すべて</option>
        </select>
      </div>

      <div id="department-list" class="table-wrap">
        <p class="loading">読み込み中…</p>
      </div>
    </section>
  </div>

  <script>
    const SUPABASE_URL = "https://bpfytlurmubgmzaisonp.supabase.co";
    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJwZnl0bHVybXViZ216YWlzb25wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2OTA2MzUsImV4cCI6MjA5NTI2NjYzNX0.rIimKp_spSxCuuKCJlFoa8ux4BvFodHam0S3XGTFRa0";

    const FACULTY_TABLE = "libraly_app_faculty";
    const DEPARTMENT_TABLE = "libraly_app_department";
    const MESSAGE_HIDE_MS = 4000;

    let messageTimer = null;
    let isBusy = false;
    let editingFacultyId = null;
    let editingDepartmentId = null;
    let facultiesCache = [];
    let departmentsCache = [];
    let deptListFilter = "";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const messageEl = document.getElementById("message");
    const facultyForm = document.getElementById("faculty-form");
    const facultyNameInput = document.getElementById("faculty-name");
    const facultySaveBtn = document.getElementById("faculty-save-btn");
    const facultyCancelBtn = document.getElementById("faculty-cancel-btn");
    const facultyEditHint = document.getElementById("faculty-edit-hint");
    const facultyListEl = document.getElementById("faculty-list");

    const departmentForm = document.getElementById("department-form");
    const deptFacultySelect = document.getElementById("dept-faculty-id");
    const departmentNameInput = document.getElementById("department-name");
    const departmentSaveBtn = document.getElementById("department-save-btn");
    const departmentCancelBtn = document.getElementById("department-cancel-btn");
    const departmentEditHint = document.getElementById("department-edit-hint");
    const deptListFilterEl = document.getElementById("dept-list-filter");
    const departmentListEl = document.getElementById("department-list");

    function showMessage(text, type) {
      clearTimeout(messageTimer);
      messageEl.textContent = text;
      messageEl.className = "message is-visible message--" + type;
      messageTimer = setTimeout(function () {
        messageEl.classList.remove("is-visible");
      }, MESSAGE_HIDE_MS);
    }

    function setBusy(busy) {
      isBusy = busy;
      facultySaveBtn.disabled = busy;
      facultyCancelBtn.disabled = busy;
      departmentSaveBtn.disabled = busy;
      departmentCancelBtn.disabled = busy;
      deptFacultySelect.disabled = busy;
      deptListFilterEl.disabled = busy;
      document.querySelectorAll(".master-table button").forEach(function (btn) {
        btn.disabled = busy;
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function getFacultyName(facultyId) {
      const f = facultiesCache.find(function (x) {
        return x.id === facultyId;
      });
      return f ? f.name : "—";
    }

    function handleDbError(err, context) {
      console.error(err);
      if (err.code === "23505") {
        showMessage(context + "：同じ名前が既に登録されています。", "error");
      } else if (err.code === "23503") {
        showMessage(
          context + "：他のデータ（学科または学生）で使用されているため削除できません。",
          "error"
        );
      } else {
        showMessage("処理に失敗しました。もう一度お試しください。", "error");
      }
    }

    function populateFacultySelects(selectedFormId, selectedFilterId) {
      const opts = '<option value="">選択してください</option>';
      deptFacultySelect.innerHTML = opts;
      facultiesCache.forEach(function (f) {
        const o1 = document.createElement("option");
        o1.value = f.id;
        o1.textContent = f.name;
        deptFacultySelect.appendChild(o1);
      });
      if (selectedFormId) deptFacultySelect.value = selectedFormId;

      const filterCurrent = deptListFilterEl.value;
      deptListFilterEl.innerHTML = '<option value="">すべて</option>';
      facultiesCache.forEach(function (f) {
        const o2 = document.createElement("option");
        o2.value = f.id;
        o2.textContent = f.name;
        deptListFilterEl.appendChild(o2);
      });
      if (selectedFilterId !== undefined) {
        deptListFilterEl.value = selectedFilterId;
      } else if (filterCurrent && deptListFilterEl.querySelector('option[value="' + filterCurrent + '"]')) {
        deptListFilterEl.value = filterCurrent;
      }
    }

    function renderFacultyList() {
      if (facultiesCache.length === 0) {
        facultyListEl.innerHTML = '<p class="empty-state">学部がまだ登録されていません。</p>';
        return;
      }

      facultyListEl.innerHTML =
        '<table class="master-table"><thead><tr>' +
        "<th>学部名</th><th>操作</th></tr></thead><tbody>" +
        facultiesCache
          .map(function (f) {
            return (
              "<tr" +
              (editingFacultyId === f.id ? ' class="is-editing"' : "") +
              ' data-id="' +
              escapeHtml(f.id) +
              '">' +
              "<td>" +
              escapeHtml(f.name) +
              "</td>" +
              '<td class="actions">' +
              '<button type="button" class="btn btn-edit" data-target="faculty" data-action="edit">編集</button>' +
              '<button type="button" class="btn btn-delete" data-target="faculty" data-action="delete">削除</button>' +
              "</td></tr>"
            );
          })
          .join("") +
        "</tbody></table>";
    }

    function renderDepartmentList() {
      if (departmentsCache.length === 0) {
        departmentListEl.innerHTML = '<p class="empty-state">学科がまだ登録されていません。</p>';
        return;
      }

      let list = departmentsCache.slice();
      if (deptListFilter) {
        list = list.filter(function (d) {
          return d.faculty_id === deptListFilter;
        });
      }

      if (list.length === 0) {
        departmentListEl.innerHTML =
          '<p class="empty-state">条件に一致する学科がありません。</p>';
        return;
      }

      departmentListEl.innerHTML =
        '<table class="master-table"><thead><tr>' +
        "<th>学部</th><th>学科名</th><th>操作</th></tr></thead><tbody>" +
        list
          .map(function (d) {
            return (
              "<tr" +
              (editingDepartmentId === d.id ? ' class="is-editing"' : "") +
              ' data-id="' +
              escapeHtml(d.id) +
              '">' +
              "<td>" +
              escapeHtml(getFacultyName(d.faculty_id)) +
              "</td>" +
              "<td>" +
              escapeHtml(d.name) +
              "</td>" +
              '<td class="actions">' +
              '<button type="button" class="btn btn-edit" data-target="department" data-action="edit">編集</button>' +
              '<button type="button" class="btn btn-delete" data-target="department" data-action="delete">削除</button>' +
              "</td></tr>"
            );
          })
          .join("") +
        "</tbody></table>";
    }

    async function loadFaculties() {
      const { data, error } = await supabaseClient
        .from(FACULTY_TABLE)
        .select("id, name, created_at")
        .order("name", { ascending: true });

      if (error) {
        console.error(error);
        facultiesCache = [];
        facultyListEl.innerHTML = "";
        showMessage("学部データの取得に失敗しました。", "error");
        return false;
      }

      facultiesCache = data || [];
      populateFacultySelects(deptFacultySelect.value);
      renderFacultyList();
      return true;
    }

    async function loadDepartments() {
      const { data, error } = await supabaseClient
        .from(DEPARTMENT_TABLE)
        .select("id, faculty_id, name, created_at")
        .order("name", { ascending: true });

      if (error) {
        console.error(error);
        departmentsCache = [];
        departmentListEl.innerHTML = "";
        showMessage("学科データの取得に失敗しました。", "error");
        return false;
      }

      departmentsCache = data || [];
      renderDepartmentList();
      return true;
    }

    function clearFacultyForm() {
      facultyForm.reset();
      editingFacultyId = null;
      facultySaveBtn.textContent = "保存";
      facultyEditHint.classList.remove("is-visible");
      facultyCancelBtn.hidden = true;
      renderFacultyList();
    }

    function clearDepartmentForm() {
      departmentForm.reset();
      editingDepartmentId = null;
      departmentSaveBtn.textContent = "保存";
      departmentEditHint.classList.remove("is-visible");
      departmentCancelBtn.hidden = true;
      renderDepartmentList();
    }

    async function saveFaculty() {
      const name = facultyNameInput.value.trim();
      if (!name) {
        showMessage("学部名を入力してください。", "warn");
        return;
      }

      setBusy(true);
      try {
        if (editingFacultyId) {
          const { error } = await supabaseClient
            .from(FACULTY_TABLE)
            .update({ name: name })
            .eq("id", editingFacultyId);
          if (error) throw error;
          clearFacultyForm();
          await loadFaculties();
          await loadDepartments();
          showMessage("学部を更新しました。", "success");
        } else {
          const { error } = await supabaseClient.from(FACULTY_TABLE).insert({ name: name });
          if (error) throw error;
          clearFacultyForm();
          await loadFaculties();
          showMessage("学部を登録しました。", "success");
        }
      } catch (err) {
        handleDbError(err, "学部の保存");
      } finally {
        setBusy(false);
      }
    }

    async function saveDepartment() {
      const facultyId = deptFacultySelect.value;
      const name = departmentNameInput.value.trim();
      if (!facultyId || !name) {
        showMessage("所属学部と学科名を入力してください。", "warn");
        return;
      }

      setBusy(true);
      try {
        const payload = { faculty_id: facultyId, name: name };
        if (editingDepartmentId) {
          const { error } = await supabaseClient
            .from(DEPARTMENT_TABLE)
            .update(payload)
            .eq("id", editingDepartmentId);
          if (error) throw error;
          clearDepartmentForm();
          await loadDepartments();
          showMessage("学科を更新しました。", "success");
        } else {
          const { error } = await supabaseClient.from(DEPARTMENT_TABLE).insert(payload);
          if (error) throw error;
          clearDepartmentForm();
          await loadDepartments();
          showMessage("学科を登録しました。", "success");
        }
      } catch (err) {
        handleDbError(err, "学科の保存");
      } finally {
        setBusy(false);
      }
    }

    async function deleteFaculty(id, name) {
      if (!window.confirm("学部「" + name + "」を削除しますか？\n配下の学科がある場合は削除できません。")) {
        return;
      }
      setBusy(true);
      try {
        const { error } = await supabaseClient.from(FACULTY_TABLE).delete().eq("id", id);
        if (error) throw error;
        if (editingFacultyId === id) clearFacultyForm();
        await loadFaculties();
        await loadDepartments();
        showMessage("学部を削除しました。", "success");
      } catch (err) {
        handleDbError(err, "学部の削除");
      } finally {
        setBusy(false);
      }
    }

    async function deleteDepartment(id, name) {
      if (!window.confirm("学科「" + name + "」を削除しますか？\n学生に使用されている場合は削除できません。")) {
        return;
      }
      setBusy(true);
      try {
        const { error } = await supabaseClient.from(DEPARTMENT_TABLE).delete().eq("id", id);
        if (error) throw error;
        if (editingDepartmentId === id) clearDepartmentForm();
        await loadDepartments();
        showMessage("学科を削除しました。", "success");
      } catch (err) {
        handleDbError(err, "学科の削除");
      } finally {
        setBusy(false);
      }
    }

    facultyForm.addEventListener("submit", function (e) {
      e.preventDefault();
      if (!isBusy) saveFaculty();
    });

    departmentForm.addEventListener("submit", function (e) {
      e.preventDefault();
      if (!isBusy) saveDepartment();
    });

    facultyCancelBtn.addEventListener("click", function () {
      clearFacultyForm();
      showMessage("学部の編集をキャンセルしました。", "warn");
    });

    departmentCancelBtn.addEventListener("click", function () {
      clearDepartmentForm();
      showMessage("学科の編集をキャンセルしました。", "warn");
    });

    deptListFilterEl.addEventListener("change", function () {
      deptListFilter = deptListFilterEl.value;
      renderDepartmentList();
    });

    facultyListEl.addEventListener("click", async function (e) {
      const btn = e.target.closest("button[data-action]");
      if (!btn || isBusy) return;
      const row = btn.closest("tr[data-id]");
      if (!row) return;
      const id = row.dataset.id;
      const faculty = facultiesCache.find(function (f) {
        return f.id === id;
      });
      if (!faculty) return;

      if (btn.dataset.action === "edit") {
        editingFacultyId = id;
        facultyNameInput.value = faculty.name;
        facultySaveBtn.textContent = "更新";
        facultyEditHint.classList.add("is-visible");
        facultyCancelBtn.hidden = false;
        renderFacultyList();
        facultyForm.scrollIntoView({ behavior: "smooth", block: "start" });
        return;
      }
      if (btn.dataset.action === "delete") {
        await deleteFaculty(id, faculty.name);
      }
    });

    departmentListEl.addEventListener("click", async function (e) {
      const btn = e.target.closest("button[data-action]");
      if (!btn || isBusy) return;
      const row = btn.closest("tr[data-id]");
      if (!row) return;
      const id = row.dataset.id;
      const dept = departmentsCache.find(function (d) {
        return d.id === id;
      });
      if (!dept) return;

      if (btn.dataset.action === "edit") {
        editingDepartmentId = id;
        deptFacultySelect.value = dept.faculty_id;
        departmentNameInput.value = dept.name;
        departmentSaveBtn.textContent = "更新";
        departmentEditHint.classList.add("is-visible");
        departmentCancelBtn.hidden = false;
        renderDepartmentList();
        departmentForm.scrollIntoView({ behavior: "smooth", block: "start" });
        return;
      }
      if (btn.dataset.action === "delete") {
        await deleteDepartment(id, dept.name);
      }
    });

    document.addEventListener("DOMContentLoaded", async function () {
      setBusy(true);
      await loadFaculties();
      await loadDepartments();
      setBusy(false);
    });
  </script>
</body>
</html>
